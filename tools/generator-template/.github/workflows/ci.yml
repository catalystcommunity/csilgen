name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - stable
          - nightly
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        targets: wasm32-unknown-unknown
        components: clippy, rustfmt
    
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Check formatting
      run: cargo fmt -- --check
    
    - name: Run clippy
      run: cargo clippy --target wasm32-unknown-unknown -- -D warnings
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Build WASM module
      run: cargo build --target wasm32-unknown-unknown --release
    
    - name: Install wabt for validation
      run: |
        wget https://github.com/WebAssembly/wabt/releases/latest/download/wabt-1.0.34-ubuntu.tar.gz
        tar -xzf wabt-1.0.34-ubuntu.tar.gz
        sudo cp wabt-1.0.34/bin/* /usr/local/bin/
    
    - name: Install wasm-opt
      run: |
        wget https://github.com/WebAssembly/binaryen/releases/latest/download/binaryen-version_116-x86_64-linux.tar.gz
        tar -xzf binaryen-version_116-x86_64-linux.tar.gz
        sudo cp binaryen-version_116/bin/wasm-opt /usr/local/bin/
    
    - name: Validate WASM module
      run: chmod +x test.sh && ./test.sh validate --release
    
    - name: Upload WASM artifact
      uses: actions/upload-artifact@v3
      with:
        name: wasm-module-${{ matrix.rust }}
        path: target/wasm32-unknown-unknown/release/*.wasm

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    
    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-benchmark-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Run benchmarks
      run: chmod +x test.sh && ./test.sh benchmark --release

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install cargo-audit
      run: cargo install cargo-audit
    
    - name: Run security audit
      run: cargo audit